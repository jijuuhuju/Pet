<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>🐥 わがままひよこ育成</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>


<body>

<h1>🐥 ひよこ育成</h1>


<div id="pet">🐥</div>

<div id="message">
🐥「こんにちはだもん！」
</div>


<div class="box">

<div>❤️ なつき <span id="love">50</span></div>
<div>😤 わがまま <span id="selfish">80</span></div>
<div>🥦 野菜嫌い <span id="vegetable">100</span></div>
<div>😭 ストレス <span id="stress">20</span></div>
<div>😂 ツッコミ <span id="joke">0</span></div>
<div>💃 ダンス <span id="dance">0</span></div>

</div>


<div class="buttons">

<button onclick="giveVegetable()">🥦</button>
<button onclick="giveCake()">🍰</button>
<button onclick="giveToy()">🧸</button>
<button onclick="hug()">🫂</button>

<br>

<button onclick="dance()">💃</button>
<button onclick="giveSticker()">🏷️</button>
<button onclick="giveDrink()">🧋</button>
<button onclick="giveWatermelon()">🍉</button>

<br>

<button onclick="clean()">🧹</button>

</div>



<div class="box small">

成長：
<span id="stage">🥚たまご期</span>

<br>

性格：
<span id="personality">普通</span>

</div>



<div class="box small">

🏷️
<span id="stickers">
なし
</span>

<br>

🧸
<span id="toys">
なし
</span>

</div>



<button onclick="saveGame()">💾保存</button>

<button onclick="resetGame()">🔄リセット</button>


<script src="script.js"></script>

</body>

</html>
