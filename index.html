
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自己責任にわとり育成</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #faf8f5; padding: 20px; color: #333; }
        .game-box { background: white; padding: 30px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .pet { font-size: 90px; margin: 20px 0; }
        .punch { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 1px); } 100% { transform: translate(-1px, -2px); } }
        .status-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .dialogue-box { background: #fff0f2; border-left: 5px solid #ff4a6b; padding: 15px; min-height: 70px; margin: 20px 0; text-align: left; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-ignore { background: #e0e0e0; color: #424242; }
        .btn-feed1 { background: #ffe082; } .btn-feed2 { background: #ffab91; } .btn-feed3 { background: #c8e6c9; }
        .btn-toy, .btn-evolve { grid-column: span 2; display: none; }
        .btn-toy { background: #ffcc80; } .btn-evolve { background: #a5d6a7; }
    </style>
</head>
<body>
<div class="game-box">
    <h2 id="stage-title">ひよこ期（わんぱく暴君）</h2>
    <div id="pet-avatar" class="pet">🐥</div>
    <div id="dialogue" class="dialogue-box">「お腹すいたーー！😭 早くごはん！遅れたら全部あんたのせいだからね！😭」</div>
    <div class="status-container">
        <div>栄養: <span id="nutrition">0</span></div><div>ストレス: <span id="stress">0</span></div>
        <div>所持金: <span id="money">4000</span>円</div><div>ターン: <span id="turns">0</span>/6</div>
    </div>
    <div class="btn-group">
        <button class="btn-feed1" onclick="action('organic')">高級穀物</button>
        <button class="btn-feed2" onclick="action('junk')">ポテト</button>
        <button class="btn-feed3" onclick="action('veg')">野菜</button>
        <button class="btn-ignore" onclick="action('ignore')">完全に無視する</button>
        <button class="btn-toy" id="btn-t1" onclick="action('buy-toy')">派手なおもちゃ（-1500円）</button>
        <button class="btn-evolve" id="btn-ev" onclick="evolve()">進化する</button>
    </div>
</div>
<script>
    let nutrition = 0, stress = 0, money = 4000, turns = 0, isEvolved = false, isDemandingToy = false;
    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'piyo') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1); }
        else if (type === 'punch') { osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(50, now + 0.15); }
        else if (type === 'veg') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); }
        else if (type === 'evolve') { osc.type = 'square'; osc.frequency.setValueAtTime(523, now); }
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    }
    function action(type) {
        if (turns >= 6 || isEvolved) return;
        const avatar = document.getElementById('pet-avatar');
        if (isDemandingToy && type !== 'buy-toy') {
            stress += 30; isDemandingToy = false; document.getElementById('btn-t1').style.display = 'none';
            avatar.classList.add('punch'); playSound('punch');
            say("「無視したなーー！！おりゃー！😭」");
            setTimeout(() => avatar.classList.remove('punch'), 500);
            return nextTurn();
        }
        if (type === 'ignore') { stress += 20; playSound('punch'); say("「無視したなーー！！😭 構わないなら大声で泣く！😭」"); }
        else if (type === 'buy-toy') { money -= 1500; stress = Math.max(0, stress - 40); isDemandingToy = false; document.getElementById('btn-t1').style.display = 'none'; say("「やったーー！！😆」"); }
        else { playSound('piyo'); say("「おいしい！でもあんたのせいだからね！🥺」"); }
        nextTurn();
    }
    function nextTurn() {
        turns++; document.getElementById('turns').innerText = turns;
        if (turns >= 6) { endGame(); } else if ((turns === 2 || turns === 4) && !isDemandingToy) {
            isDemandingToy = true; document.getElementById('btn-t1').style.display = 'block'; say("「おもちゃ買ってーー！！😭」");
        }
    }
    function say(text) { document.getElementById('dialogue').innerText = text; }
    function endGame() {
        document.querySelector('.btn-group').innerHTML = '<button class="btn-evolve" style="display:block" onclick="evolve()">運命を受け入れる</button>';
        say("「……あ、進化の時間だ。ボタンを押してね🥺」");
    }
    function evolve() {
        isEvolved = true; playSound('evolve');
        document.getElementById('pet-avatar').innerText = "🍗";
        say("「あんたのせいでお肉になっちゃったじゃん！美味しく食べてね🥺」");
    }
</script>
</body>
</html>
